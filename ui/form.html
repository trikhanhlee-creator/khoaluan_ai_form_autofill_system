<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFill AI System - Form Điền Dữ Liệu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #777;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #f9f9ff;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .suggestions-dropdown.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: #f5f5ff;
            color: #667eea;
        }

        .suggestion-meta {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status-indicator.no-suggestions {
            background-color: #ccc;
        }

        .status-indicator.has-suggestions {
            background-color: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .field-status {
            font-size: 12px;
            margin-top: 5px;
            color: #999;
            display: flex;
            align-items: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-reset:hover {
            background: #e8e8e8;
            border-color: #999;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }

        .message.success {
            background-color: #c8e6c9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
            display: block;
        }

        .message.error {
            background-color: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #f44336;
            display: block;
        }

        .message.info {
            background-color: #bbdefb;
            color: #1565c0;
            border-left: 4px solid #2196f3;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-panel {
            background: #f5f5ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #666;
        }

        .stats-item:last-child {
            margin-bottom: 0;
        }

        .stats-value {
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ AutoFill AI System</h1>
            <p>Form Điền Dữ Liệu Thông Minh - Gợi Ý Tự Động từ Lịch Sử</p>
        </div>

        <div id="message" class="message"></div>

        <form id="dataForm">
            <!-- User ID (hidden) -->
            <input type="hidden" id="userId" value="1">

            <!-- Name Field -->
            <div class="form-group">
                <label for="name">👤 Họ và Tên</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Nhập họ và tên..." autocomplete="off">
                    <div class="suggestions-dropdown" data-field="name"></div>
                </div>
                <div class="field-status" data-status="name"></div>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">📧 Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="Nhập địa chỉ email..." autocomplete="off">
                    <div class="suggestions-dropdown" data-field="email"></div>
                </div>
                <div class="field-status" data-status="email"></div>
            </div>

            <!-- Phone Field -->
            <div class="form-group">
                <label for="phone">📱 Số Điện Thoại</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." autocomplete="off">
                    <div class="suggestions-dropdown" data-field="phone"></div>
                </div>
                <div class="field-status" data-status="phone"></div>
            </div>

            <!-- City Field -->
            <div class="form-group">
                <label for="city">🏙️ Thành Phố</label>
                <div class="input-wrapper">
                    <input type="text" id="city" placeholder="Nhập thành phố..." autocomplete="off">
                    <div class="suggestions-dropdown" data-field="city"></div>
                </div>
                <div class="field-status" data-status="city"></div>
            </div>

            <!-- Company Field -->
            <div class="form-group">
                <label for="company">🏢 Công Ty</label>
                <div class="input-wrapper">
                    <input type="text" id="company" placeholder="Nhập tên công ty..." autocomplete="off">
                    <div class="suggestions-dropdown" data-field="company"></div>
                </div>
                <div class="field-status" data-status="company"></div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">💾 Lưu Dữ Liệu</button>
                <button type="reset" class="btn-reset">🔄 Xóa Form</button>
            </div>
        </form>

        <!-- Stats Panel -->
        <div class="stats-panel" id="statsPanel">
            <div class="stats-item">
                <span>Trạng thái kết nối:</span>
                <span class="stats-value" id="connectionStatus">Chưa kết nối</span>
            </div>
            <div class="stats-item">
                <span>User ID:</span>
                <span class="stats-value">1</span>
            </div>
            <div class="stats-item">
                <span>Server:</span>
                <span class="stats-value">http://127.0.0.1:8000</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';
        const FIELD_MAPPING = {
            'name': { field_id: 1, form_id: 1, label: 'Họ và Tên' },
            'email': { field_id: 2, form_id: 1, label: 'Email' },
            'phone': { field_id: 3, form_id: 1, label: 'Số Điện Thoại' },
            'city': { field_id: 4, form_id: 1, label: 'Thành Phố' },
            'company': { field_id: 5, form_id: 1, label: 'Công Ty' }
        };

        let suggestionsCache = {};
        let entryCountCache = {};

        // Check server connection on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/suggestions?user_id=1&field_id=1&top_k=1`);
                if (response.ok) {
                    document.getElementById('connectionStatus').textContent = '✅ Đã kết nối';
                    document.getElementById('connectionStatus').style.color = '#4caf50';
                    showMessage('✅ Kết nối thành công với server AutoFill AI!', 'success');
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                document.getElementById('connectionStatus').textContent = '❌ Lỗi kết nối';
                document.getElementById('connectionStatus').style.color = '#f44336';
                showMessage('❌ Không thể kết nối với server. Vui lòng kiểm tra xem server có chạy không (python -m uvicorn app.main:app --reload)', 'error');
            }
        });

        // Event listeners for form inputs
        document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"]').forEach(input => {
            const fieldName = input.id;

            // Show suggestions on input
            input.addEventListener('input', async (e) => {
                const value = e.target.value.trim();
                
                if (value.length > 0) {
                    await fetchAndShowSuggestions(fieldName, value);
                } else {
                    hideSuggestions(fieldName);
                }
            });

            // Save entry on blur
            input.addEventListener('blur', async (e) => {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    await saveEntry(fieldName, value);
                }
                hideSuggestions(fieldName);
            });

            // Select suggestion on arrow keys and Enter
            input.addEventListener('keydown', async (e) => {
                const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
                if (dropdown && dropdown.classList.contains('show')) {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        const items = dropdown.querySelectorAll('.suggestion-item');
                        const currentIndex = Array.from(items).findIndex(item => item.classList.contains('selected'));
                        
                        if (e.key === 'ArrowDown') {
                            const nextIndex = currentIndex < items.length - 1 ? currentIndex + 1 : 0;
                            selectSuggestionItem(items[nextIndex], input);
                        } else {
                            const prevIndex = currentIndex > 0 ? currentIndex - 1 : items.length - 1;
                            selectSuggestionItem(items[prevIndex], input);
                        }
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        const selectedItem = dropdown.querySelector('.suggestion-item.selected');
                        if (selectedItem) {
                            input.value = selectedItem.dataset.value;
                            hideSuggestions(fieldName);
                            await saveEntry(fieldName, input.value);
                        }
                    }
                }
            });
        });

        function selectSuggestionItem(item, input) {
            const dropdown = input.nextElementSibling;
            dropdown.querySelectorAll('.suggestion-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
        }

        async function fetchAndShowSuggestions(fieldName, currentValue) {
            try {
                const fieldConfig = FIELD_MAPPING[fieldName];
                const response = await fetch(`${API_BASE_URL}/suggestions?user_id=1&field_id=${fieldConfig.field_id}&top_k=5`);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const suggestions = data.suggestions || [];
                
                const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
                dropdown.innerHTML = '';
                
                if (suggestions.length > 0) {
                    suggestions.forEach(suggestion => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.dataset.value = suggestion.suggested_value;
                        
                        const value = suggestion.suggested_value;
                        const frequency = suggestion.frequency;
                        const lastUsed = new Date(suggestion.last_used).toLocaleDateString('vi-VN');
                        
                        item.innerHTML = `
                            <div><strong>${escapeHtml(value)}</strong></div>
                            <div class="suggestion-meta">📊 Sử dụng ${frequency} lần • Lần cuối: ${lastUsed}</div>
                        `;
                        
                        item.addEventListener('click', async () => {
                            document.getElementById(fieldName).value = value;
                            hideSuggestions(fieldName);
                            await saveEntry(fieldName, value);
                        });
                        
                        dropdown.appendChild(item);
                    });
                    
                    dropdown.classList.add('show');
                    updateFieldStatus(fieldName, `💡 ${suggestions.length} gợi ý available`, 'has-suggestions');
                } else {
                    updateFieldStatus(fieldName, '⚠️ Cần nhập ≥2 lần để có gợi ý', 'no-suggestions');
                }
            } catch (error) {
                console.error(`Error fetching suggestions for ${fieldName}:`, error);
                updateFieldStatus(fieldName, '❌ Lỗi tải gợi ý', 'no-suggestions');
            }
        }

        async function saveEntry(fieldName, value) {
            try {
                const fieldConfig = FIELD_MAPPING[fieldName];
                const response = await fetch(`${API_BASE_URL}/suggestions/save?user_id=1&field_id=${fieldConfig.field_id}&form_id=${fieldConfig.form_id}&value=${encodeURIComponent(value)}`, {
                    method: 'POST'
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                updateFieldStatus(fieldName, `✅ Đã lưu (ID: ${data.entry_id})`, 'has-suggestions');
                
                // Clear cache to refresh suggestions
                delete suggestionsCache[fieldName];
            } catch (error) {
                console.error(`Error saving entry for ${fieldName}:`, error);
                updateFieldStatus(fieldName, '❌ Lỗi lưu dữ liệu', 'no-suggestions');
            }
        }

        function hideSuggestions(fieldName) {
            const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
            dropdown.classList.remove('show');
        }

        function updateFieldStatus(fieldName, text, statusClass) {
            const statusElement = document.querySelector(`[data-status="${fieldName}"]`);
            statusElement.innerHTML = `<span class="status-indicator ${statusClass}"></span>${text}`;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            
            setTimeout(() => {
                messageEl.className = 'message';
            }, 5000);
        }

        // Form submission
        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                city: document.getElementById('city').value.trim(),
                company: document.getElementById('company').value.trim()
            };

            if (!formData.name || !formData.email) {
                showMessage('⚠️ Vui lòng nhập Họ Tên và Email', 'error');
                return;
            }

            showMessage('💾 Đang lưu dữ liệu...', 'info');
            
            try {
                // Save all fields
                let successCount = 0;
                for (const [fieldName, value] of Object.entries(formData)) {
                    if (value) {
                        await saveEntry(fieldName, value);
                        successCount++;
                    }
                }
                
                showMessage(`✅ Đã lưu thành công ${successCount} trường dữ liệu!`, 'success');
                
                // Don't reset form, just clear status messages
                setTimeout(() => {
                    document.querySelectorAll('.field-status').forEach(status => {
                        status.innerHTML = '';
                    });
                }, 2000);
            } catch (error) {
                showMessage('❌ Có lỗi khi lưu dữ liệu. Vui lòng thử lại.', 'error');
            }
        });

        // Reset form
        document.getElementById('dataForm').addEventListener('reset', () => {
            document.querySelectorAll('.field-status').forEach(status => {
                status.innerHTML = '';
            });
            document.querySelectorAll('.suggestions-dropdown').forEach(dropdown => {
                dropdown.classList.remove('show');
            });
            showMessage('🔄 Form đã được xóa', 'info');
        });
    </script>
</body>
</html>
