<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFill AI System - Form</title>
    <script src="/static/js/theme-manager.js"></script>
    <link rel="stylesheet" href="/static/css/site.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="/"><span class="brand-dot"></span><span>AutoFill AI System</span></a>
            <div class="topbar-actions">
                <button class="btn secondary" data-theme-toggle>
                    <span data-theme-icon>🌙</span>
                    <span data-theme-label>Tối</span>
                </button>
                <a class="btn secondary" href="/word-upload">Word Upload</a>
            </div>
        </header>

        <main class="main-wrap fade-in">
            <div class="layout-2col">
                <aside class="sidebar">
                    <ul class="nav-list">
                        <li><a class="nav-link" data-nav-link href="/">Tổng quan</a></li>
                        <li><a class="nav-link" data-nav-link href="/form">Form AutoFill</a></li>
                        <li><a class="nav-link" data-nav-link href="/word-upload">Word Upload</a></li>
                        <li><a class="nav-link" data-nav-link href="/excel">Excel Upload</a></li>
                        <li><a class="nav-link" data-nav-link href="/composer">Composer</a></li>
                        <li data-admin-link style="display:none;"><a class="nav-link" data-nav-link href="/admin-dashboard">Admin</a></li>
                    </ul>
                </aside>

                <section>
                    <div class="hero">
                        <span class="badge info">Auto suggestion engine</span>
                        <h1>Form điền dữ liệu thông minh</h1>
                        <p>Lấy gợi ý theo lịch sử nhập liệu và lưu theo trạng thái sử dụng.</p>
                        <p id="modeNotice" class="muted"></p>
                        <div class="btn-row" id="authActions" style="margin-top: 12px; display:none;">
                            <a class="btn secondary" href="/login?next=%2Fform">Đăng nhập để lưu lịch sử lâu dài</a>
                        </div>
                    </div>

                    <div class="panel">
                        <div id="message" class="message"></div>
                        <form id="dataForm">
                            <div class="form-group">
                                <label for="name">Họ và tên</label>
                                <div class="input-wrap">
                                    <input type="text" id="name" placeholder="Nhập họ và tên..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="name"></div>
                                </div>
                                <div class="muted" data-status="name"></div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <div class="input-wrap">
                                    <input type="email" id="email" placeholder="Nhập email..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="email"></div>
                                </div>
                                <div class="muted" data-status="email"></div>
                            </div>

                            <div class="form-group">
                                <label for="phone">Số điện thoại</label>
                                <div class="input-wrap">
                                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="phone"></div>
                                </div>
                                <div class="muted" data-status="phone"></div>
                            </div>

                            <div class="form-group">
                                <label for="city">Thành phố</label>
                                <div class="input-wrap">
                                    <input type="text" id="city" placeholder="Nhập thành phố..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="city"></div>
                                </div>
                                <div class="muted" data-status="city"></div>
                            </div>

                            <div class="form-group">
                                <label for="company">Công ty</label>
                                <div class="input-wrap">
                                    <input type="text" id="company" placeholder="Nhập công ty..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="company"></div>
                                </div>
                                <div class="muted" data-status="company"></div>
                            </div>

                            <div class="btn-row">
                                <button class="btn primary" type="submit">Lưu dữ liệu</button>
                                <button class="btn secondary" type="reset">Xóa form</button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="globalToast" class="toast"></div>
    <script src="/static/js/site-ui.js?v=20260406-1"></script>
    <script>
        const API_BASE_URL = '/api';
        const GUEST_HISTORY_KEY = 'autofill-guest-form-history-v1';
        const FIELD_MAPPING = {
            name: { field_id: 1, form_id: 1 },
            email: { field_id: 2, form_id: 1 },
            phone: { field_id: 3, form_id: 1 },
            city: { field_id: 4, form_id: 1 },
            company: { field_id: 5, form_id: 1 }
        };

        const state = {
            mode: 'guest',
            userId: null,
            guestEntries: []
        };

        function loadGuestEntries() {
            try {
                const raw = sessionStorage.getItem(GUEST_HISTORY_KEY);
                if (!raw) {
                    return [];
                }
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function saveGuestEntries() {
            sessionStorage.setItem(GUEST_HISTORY_KEY, JSON.stringify(state.guestEntries));
        }

        function normalizeText(value) {
            return String(value || '').trim().toLowerCase();
        }

        function buildGuestSuggestions(fieldName, typedValue, topK = 5) {
            const normalizedTyped = normalizeText(typedValue);
            const stats = new Map();

            state.guestEntries.forEach((entry) => {
                if (!entry || entry.field_name !== fieldName) {
                    return;
                }

                const value = String(entry.value || '').trim();
                if (!value) {
                    return;
                }

                const normalizedValue = normalizeText(value);
                if (normalizedTyped && !normalizedValue.startsWith(normalizedTyped)) {
                    return;
                }

                if (!stats.has(value)) {
                    stats.set(value, {
                        value,
                        frequency: 0,
                        latest_time: entry.saved_at || ''
                    });
                }

                const row = stats.get(value);
                row.frequency += 1;
                if (entry.saved_at && entry.saved_at > row.latest_time) {
                    row.latest_time = entry.saved_at;
                }
            });

            return Array.from(stats.values())
                .sort((a, b) => {
                    if (b.frequency !== a.frequency) {
                        return b.frequency - a.frequency;
                    }
                    return String(b.latest_time || '').localeCompare(String(a.latest_time || ''));
                })
                .slice(0, topK);
        }

        function setModeNotice(message) {
            const modeNotice = document.getElementById('modeNotice');
            if (modeNotice) {
                modeNotice.textContent = message;
            }
        }

        function toggleAuthActions(show) {
            const authActions = document.getElementById('authActions');
            if (authActions) {
                authActions.style.display = show ? '' : 'none';
            }
        }

        async function detectUsageMode() {
            state.guestEntries = loadGuestEntries();

            try {
                const response = await fetch('/api/auth/session', {
                    method: 'GET',
                    credentials: 'include',
                    cache: 'no-store'
                });
                const data = response.ok ? await response.json() : { authenticated: false };

                if (data && data.authenticated && data.user) {
                    state.mode = 'account';
                    state.userId = data.user.user_id;
                    setModeNotice(`Đang đăng nhập: ${data.user.username || data.user.email}. Lịch sử sẽ lưu riêng theo tài khoản.`);
                    toggleAuthActions(false);
                    return;
                }
            } catch (error) {
                // Fallback to guest mode.
            }

            state.mode = 'guest';
            state.userId = null;
            setModeNotice('Chế độ miễn phí: lịch sử gợi ý chỉ lưu trong phiên trình duyệt hiện tại và sẽ mất khi tắt web.');
            toggleAuthActions(true);
        }

        document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"]').forEach(input => {
            const fieldName = input.id;

            input.addEventListener('input', async (e) => {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    await fetchAndShowSuggestions(fieldName);
                } else {
                    hideSuggestions(fieldName);
                }
            });

            input.addEventListener('blur', async (e) => {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    await saveEntry(fieldName, value);
                }
                setTimeout(() => hideSuggestions(fieldName), 120);
            });

            input.addEventListener('keydown', async (e) => {
                const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
                if (!dropdown || !dropdown.classList.contains('show')) {
                    return;
                }

                const items = dropdown.querySelectorAll('.suggestion-item');
                const currentIndex = Array.from(items).findIndex(i => i.classList.contains('selected'));

                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const nextIndex = e.key === 'ArrowDown'
                        ? (currentIndex < items.length - 1 ? currentIndex + 1 : 0)
                        : (currentIndex > 0 ? currentIndex - 1 : items.length - 1);
                    items.forEach(i => i.classList.remove('selected'));
                    if (items[nextIndex]) {
                        items[nextIndex].classList.add('selected');
                    }
                }

                if (e.key === 'Enter') {
                    const selected = dropdown.querySelector('.suggestion-item.selected');
                    if (selected) {
                        e.preventDefault();
                        input.value = selected.dataset.value;
                        hideSuggestions(fieldName);
                        await saveEntry(fieldName, input.value);
                    }
                }
            });
        });

        async function fetchAndShowSuggestions(fieldName) {
            const conf = FIELD_MAPPING[fieldName];
            const typedValue = document.getElementById(fieldName).value.trim();
            const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);

            try {
                let suggestions = [];

                if (state.mode === 'account') {
                    const response = await fetch(`${API_BASE_URL}/suggestions?field_id=${conf.field_id}&top_k=5`, {
                        method: 'GET',
                        credentials: 'include'
                    });
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    const data = await response.json();
                    suggestions = Array.isArray(data.suggestions) ? data.suggestions : [];
                } else {
                    suggestions = buildGuestSuggestions(fieldName, typedValue, 5);
                }

                if (!suggestions.length) {
                    updateFieldStatus(fieldName, 'Chưa có gợi ý phù hợp.');
                    dropdown.classList.remove('show');
                    return;
                }

                dropdown.innerHTML = suggestions.map(item => {
                    const rawValue = item.suggested_value || item.value || '';
                    const value = escapeHtml(rawValue);
                    const freq = item.frequency || 1;
                    return `<div class="suggestion-item" data-value="${value}"><div><strong>${value}</strong></div><div class="suggestion-meta">Sử dụng ${freq} lần</div></div>`;
                }).join('');

                dropdown.querySelectorAll('.suggestion-item').forEach(node => {
                    node.addEventListener('click', async () => {
                        document.getElementById(fieldName).value = node.dataset.value;
                        hideSuggestions(fieldName);
                        await saveEntry(fieldName, node.dataset.value);
                    });
                });

                dropdown.classList.add('show');
                updateFieldStatus(fieldName, `${suggestions.length} gợi ý sẵn sàng`);
            } catch (error) {
                updateFieldStatus(fieldName, 'Lỗi tải gợi ý');
            }
        }

        async function saveEntry(fieldName, value) {
            const conf = FIELD_MAPPING[fieldName];
            const normalized = String(value || '').trim();
            if (!normalized) {
                return;
            }

            try {
                if (state.mode === 'account') {
                    const response = await fetch(`${API_BASE_URL}/suggestions/save?field_id=${conf.field_id}&form_id=${conf.form_id}&value=${encodeURIComponent(normalized)}`, {
                        method: 'POST',
                        credentials: 'include'
                    });
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                } else {
                    state.guestEntries.push({
                        field_name: fieldName,
                        value: normalized,
                        saved_at: new Date().toISOString()
                    });
                    saveGuestEntries();
                }

                updateFieldStatus(fieldName, 'Đã lưu thành công');
            } catch (error) {
                updateFieldStatus(fieldName, 'Lưu thất bại');
            }
        }

        function hideSuggestions(fieldName) {
            const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
            if (dropdown) dropdown.classList.remove('show');
        }

        function updateFieldStatus(fieldName, text) {
            const node = document.querySelector(`[data-status="${fieldName}"]`);
            node.textContent = text;
        }

        function showMessage(text, type) {
            const node = document.getElementById('message');
            node.className = 'message show ' + type;
            node.textContent = text;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const values = ['name', 'email', 'phone', 'city', 'company']
                .map(id => [id, document.getElementById(id).value.trim()])
                .filter(entry => entry[1]);

            if (!document.getElementById('name').value.trim() || !document.getElementById('email').value.trim()) {
                showMessage('Vui lòng nhập ít nhất Họ tên và Email.', 'error');
                return;
            }

            for (const [field, value] of values) {
                await saveEntry(field, value);
            }
            showMessage(`Đã lưu ${values.length} trường dữ liệu.`, 'success');
        });

        window.addEventListener('load', async () => {
            await detectUsageMode();
            if (state.mode === 'account') {
                showMessage('Đang dùng chế độ tài khoản. Lịch sử sẽ lưu riêng cho bạn.', 'success');
            } else {
                showMessage('Đang dùng miễn phí. Lịch sử chỉ lưu tạm đến khi tắt trình duyệt.', 'success');
            }
        });
    </script>
</body>
</html>
