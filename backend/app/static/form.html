<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFill AI System - Form</title>
    <script src="/static/js/theme-manager.js"></script>
    <link rel="stylesheet" href="/static/css/site.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="/"><span class="brand-dot"></span><span>AutoFill AI System</span></a>
            <div class="topbar-actions">
                <button class="btn secondary" data-theme-toggle>
                    <span data-theme-icon>🌙</span>
                    <span data-theme-label>Tối</span>
                </button>
                <a class="btn secondary" href="/word-upload">Word Upload</a>
            </div>
        </header>

        <main class="main-wrap fade-in">
            <div class="layout-2col">
                <aside class="sidebar">
                    <ul class="nav-list">
                        <li><a class="nav-link" data-nav-link href="/">Tổng quan</a></li>
                        <li><a class="nav-link" data-nav-link href="/form">Form AutoFill</a></li>
                        <li><a class="nav-link" data-nav-link href="/word-upload">Word Upload</a></li>
                        <li><a class="nav-link" data-nav-link href="/excel">Excel Upload</a></li>
                        <li><a class="nav-link" data-nav-link href="/composer">Composer</a></li>
                        <li data-admin-link style="display:none;"><a class="nav-link" data-nav-link href="/admin-dashboard">Admin</a></li>
                    </ul>
                </aside>

                <section>
                    <div class="hero">
                        <span class="badge info">Auto suggestion engine</span>
                        <h1>Form điền dữ liệu thông minh</h1>
                        <p>Lấy gợi ý theo lịch sử nhập liệu và lưu lại tự động theo từng trường.</p>
                    </div>

                    <div class="panel">
                        <div id="message" class="message"></div>
                        <form id="dataForm">
                            <input type="hidden" id="userId" value="1">

                            <div class="form-group">
                                <label for="name">Họ và tên</label>
                                <div class="input-wrap">
                                    <input type="text" id="name" placeholder="Nhập họ và tên..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="name"></div>
                                </div>
                                <div class="muted" data-status="name"></div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <div class="input-wrap">
                                    <input type="email" id="email" placeholder="Nhập email..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="email"></div>
                                </div>
                                <div class="muted" data-status="email"></div>
                            </div>

                            <div class="form-group">
                                <label for="phone">Số điện thoại</label>
                                <div class="input-wrap">
                                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="phone"></div>
                                </div>
                                <div class="muted" data-status="phone"></div>
                            </div>

                            <div class="form-group">
                                <label for="city">Thành phố</label>
                                <div class="input-wrap">
                                    <input type="text" id="city" placeholder="Nhập thành phố..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="city"></div>
                                </div>
                                <div class="muted" data-status="city"></div>
                            </div>

                            <div class="form-group">
                                <label for="company">Công ty</label>
                                <div class="input-wrap">
                                    <input type="text" id="company" placeholder="Nhập công ty..." autocomplete="off">
                                    <div class="suggestions-dropdown" data-field="company"></div>
                                </div>
                                <div class="muted" data-status="company"></div>
                            </div>

                            <div class="btn-row">
                                <button class="btn primary" type="submit">Lưu dữ liệu</button>
                                <button class="btn secondary" type="reset">Xóa form</button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="globalToast" class="toast"></div>
    <script src="/static/js/site-ui.js"></script>
    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';
        const FIELD_MAPPING = {
            name: { field_id: 1, form_id: 1 },
            email: { field_id: 2, form_id: 1 },
            phone: { field_id: 3, form_id: 1 },
            city: { field_id: 4, form_id: 1 },
            company: { field_id: 5, form_id: 1 }
        };

        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/suggestions?user_id=1&field_id=1&top_k=1`);
                if (response.ok) {
                    showMessage('Kết nối server thành công.', 'success');
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                showMessage('Không thể kết nối server, vui lòng kiểm tra backend.', 'error');
            }
        });

        document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"]').forEach(input => {
            const fieldName = input.id;

            input.addEventListener('input', async (e) => {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    await fetchAndShowSuggestions(fieldName);
                } else {
                    hideSuggestions(fieldName);
                }
            });

            input.addEventListener('blur', async (e) => {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    await saveEntry(fieldName, value);
                }
                setTimeout(() => hideSuggestions(fieldName), 120);
            });

            input.addEventListener('keydown', async (e) => {
                const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
                if (!dropdown || !dropdown.classList.contains('show')) {
                    return;
                }

                const items = dropdown.querySelectorAll('.suggestion-item');
                const currentIndex = Array.from(items).findIndex(i => i.classList.contains('selected'));

                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const nextIndex = e.key === 'ArrowDown'
                        ? (currentIndex < items.length - 1 ? currentIndex + 1 : 0)
                        : (currentIndex > 0 ? currentIndex - 1 : items.length - 1);
                    items.forEach(i => i.classList.remove('selected'));
                    if (items[nextIndex]) {
                        items[nextIndex].classList.add('selected');
                    }
                }

                if (e.key === 'Enter') {
                    const selected = dropdown.querySelector('.suggestion-item.selected');
                    if (selected) {
                        e.preventDefault();
                        input.value = selected.dataset.value;
                        hideSuggestions(fieldName);
                        await saveEntry(fieldName, input.value);
                    }
                }
            });
        });

        async function fetchAndShowSuggestions(fieldName) {
            const conf = FIELD_MAPPING[fieldName];
            const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);

            try {
                const response = await fetch(`${API_BASE_URL}/suggestions?user_id=1&field_id=${conf.field_id}&top_k=5`);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                const suggestions = data.suggestions || [];

                if (!suggestions.length) {
                    updateFieldStatus(fieldName, 'Chưa có gợi ý phù hợp.');
                    dropdown.classList.remove('show');
                    return;
                }

                dropdown.innerHTML = suggestions.map(item => {
                    const value = escapeHtml(item.suggested_value || item.value || '');
                    const freq = item.frequency || 1;
                    return `<div class="suggestion-item" data-value="${value}"><div><strong>${value}</strong></div><div class="suggestion-meta">Sử dụng ${freq} lần</div></div>`;
                }).join('');

                dropdown.querySelectorAll('.suggestion-item').forEach(node => {
                    node.addEventListener('click', async () => {
                        document.getElementById(fieldName).value = node.dataset.value;
                        hideSuggestions(fieldName);
                        await saveEntry(fieldName, node.dataset.value);
                    });
                });

                dropdown.classList.add('show');
                updateFieldStatus(fieldName, `${suggestions.length} gợi ý sẵn sàng`);
            } catch (error) {
                updateFieldStatus(fieldName, 'Lỗi tải gợi ý');
            }
        }

        async function saveEntry(fieldName, value) {
            const conf = FIELD_MAPPING[fieldName];
            try {
                const response = await fetch(`${API_BASE_URL}/suggestions/save?user_id=1&field_id=${conf.field_id}&form_id=${conf.form_id}&value=${encodeURIComponent(value)}`, {
                    method: 'POST'
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                updateFieldStatus(fieldName, 'Đã lưu thành công');
            } catch (error) {
                updateFieldStatus(fieldName, 'Lưu thất bại');
            }
        }

        function hideSuggestions(fieldName) {
            const dropdown = document.querySelector(`.suggestions-dropdown[data-field="${fieldName}"]`);
            if (dropdown) dropdown.classList.remove('show');
        }

        function updateFieldStatus(fieldName, text) {
            const node = document.querySelector(`[data-status="${fieldName}"]`);
            node.textContent = text;
        }

        function showMessage(text, type) {
            const node = document.getElementById('message');
            node.className = 'message show ' + type;
            node.textContent = text;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const values = ['name', 'email', 'phone', 'city', 'company']
                .map(id => [id, document.getElementById(id).value.trim()])
                .filter(entry => entry[1]);

            if (!document.getElementById('name').value.trim() || !document.getElementById('email').value.trim()) {
                showMessage('Vui lòng nhập ít nhất Họ tên và Email.', 'error');
                return;
            }

            for (const [field, value] of values) {
                await saveEntry(field, value);
            }
            showMessage(`Đã lưu ${values.length} trường dữ liệu.`, 'success');
        });
    </script>
</body>
</html>
