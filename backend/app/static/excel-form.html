<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFill AI - Excel Form</title>
    <script src="/static/js/theme-manager.js?v=20260401-2"></script>
    <style>
        :root {
            --bg: #edf2f9;
            --surface: #ffffff;
            --surface-soft: #f4f8ff;
            --line: #d3def3;
            --line-strong: #84a4e8;
            --text: #1b2b4a;
            --muted: #5e7298;
            --primary: #3f66d8;
            --success: #0f9f71;
            --danger: #de4a5f;
            --warning: #d98524;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #16223a;
            --surface-soft: #1b2a45;
            --line: #324c7e;
            --line-strong: #5f85d8;
            --text: #e2ebff;
            --muted: #a9bddf;
            --primary: #7099ff;
            --success: #25b787;
            --danger: #ff7b8c;
            --warning: #f6b562;
        }

        .shell {
            max-width: 1200px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .meta-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-soft);
            padding: 8px 10px;
        }

        .meta-item .k {
            font-size: 12px;
            color: var(--muted);
        }

        .meta-item .v {
            font-size: 13px;
            font-weight: 700;
            margin-top: 3px;
            word-break: break-word;
        }

        .toolbar {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: var(--surface-soft);
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .toolbar-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .row-pill {
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 6px 10px;
            background: color-mix(in srgb, var(--primary) 10%, var(--surface-soft));
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .btn {
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--surface-soft);
            color: var(--primary);
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .btn.primary {
            background: linear-gradient(90deg, var(--primary), #547ce8);
            color: #fff;
            border-color: var(--primary);
        }

        .btn.success {
            background: linear-gradient(90deg, var(--success), #17ac80);
            color: #fff;
            border-color: var(--success);
        }

        .btn.warning {
            background: linear-gradient(90deg, var(--warning), #e79a35);
            color: #fff;
            border-color: var(--warning);
        }

        .btn.danger {
            background: color-mix(in srgb, var(--danger) 12%, var(--surface-soft));
            color: var(--danger);
            border-color: color-mix(in srgb, var(--danger) 52%, var(--line-strong));
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-bottom: 10px;
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid transparent;
            display: none;
            font-size: 13px;
            font-weight: 600;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: color-mix(in srgb, var(--success) 14%, transparent);
            border-color: color-mix(in srgb, var(--success) 35%, transparent);
            color: var(--success);
        }

        .message.error {
            background: color-mix(in srgb, var(--danger) 14%, transparent);
            border-color: color-mix(in srgb, var(--danger) 35%, transparent);
            color: var(--danger);
        }

        .message.info {
            background: color-mix(in srgb, var(--primary) 14%, transparent);
            border-color: color-mix(in srgb, var(--primary) 30%, transparent);
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            background: var(--surface-soft);
            color: var(--text);
        }

        .form-group textarea {
            min-height: 78px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--line-strong);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--line-strong) 22%, transparent);
        }

        .empty {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 14px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
        }

        @media (max-width: 720px) {
            .meta,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <h1 class="title">Excel Dynamic Form</h1>
        <div class="top-actions">
            <button class="btn" type="button" data-theme-toggle><span data-theme-icon>☀️</span><span data-theme-label>Sáng</span></button>
            <a class="btn" href="/excel">← Về trang Excel</a>
        </div>
    </header>

    <section class="panel">
        <h2>Biểu mẫu tự động từ file Excel</h2>
        <div id="mainMessage" class="message"></div>

        <div class="meta">
            <div class="meta-item">
                <div class="k">Session</div>
                <div id="metaSession" class="v">-</div>
            </div>
            <div class="meta-item">
                <div class="k">Tên file</div>
                <div id="metaFilename" class="v">-</div>
            </div>
            <div class="meta-item">
                <div class="k">Tổng số dòng</div>
                <div id="metaRows" class="v">0</div>
            </div>
        </div>

        <form id="dynamicForm" class="form-grid"></form>

        <div class="toolbar">
            <div class="toolbar-row">
                <span id="rowIndicator" class="row-pill">Dòng hiện tại: 0/0</span>
                <button id="prevRowBtn" type="button" class="btn">◀ Dòng trước</button>
                <button id="nextRowBtn" type="button" class="btn">Dòng tiếp ▶</button>
                <button id="saveRowBtn" type="button" class="btn success">💾 Lưu</button>
            </div>
        </div>
    </section>
</div>

<script>
const rawSessionId = '{{SESSION_ID}}';

const state = {
    sessionId: '',
    headers: [],
    rows: [],
    currentRowIndex: 0,
    filename: ''
};

const mainMessage = document.getElementById('mainMessage');
const dynamicForm = document.getElementById('dynamicForm');
const rowIndicator = document.getElementById('rowIndicator');

function bindThemeToggleFallback() {
    const buttons = document.querySelectorAll('[data-theme-toggle]');
    buttons.forEach((btn) => {
        if (btn.dataset.themeBound === '1') return;
        btn.addEventListener('click', (event) => {
            event.preventDefault();
            if (window.themeManager && typeof window.themeManager.toggleTheme === 'function') {
                window.themeManager.toggleTheme();
            }
        });
        btn.dataset.themeBound = '1';
    });
}

bindThemeToggleFallback();

function resolveSessionId() {
    if (rawSessionId && !rawSessionId.includes('{')) {
        return decodeURIComponent(rawSessionId);
    }
    const parts = window.location.pathname.split('/');
    return decodeURIComponent(parts[parts.length - 1] || '');
}

function showMessage(type, text) {
    mainMessage.className = `message show ${type}`;
    mainMessage.textContent = text;
}

function clearMessage() {
    mainMessage.className = 'message';
    mainMessage.textContent = '';
}

function escapeHtml(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatDate(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return '-';
    return d.toLocaleString('vi-VN');
}

async function parseApiResponse(response) {
    const rawText = await response.text();
    let data = null;
    try {
        data = rawText ? JSON.parse(rawText) : {};
    } catch (e) {
        data = null;
    }

    if (!response.ok) {
        const message = (data && (data.detail || data.error || data.message))
            ? (data.detail || data.error || data.message)
            : (rawText || `HTTP ${response.status}`);
        throw new Error(message);
    }

    return data || {};
}

async function ensureAuthenticated() {
    try {
        await fetch('/api/auth/check-auth');
        return true;
    } catch (error) {
        return true;
    }
}

function updateMeta() {
    document.getElementById('metaSession').textContent = state.sessionId || '-';
    document.getElementById('metaFilename').textContent = state.filename || '-';
    document.getElementById('metaRows').textContent = String(state.rows.length || 0);
}

function buildForm() {
    if (!state.headers.length) {
        dynamicForm.innerHTML = '<div class="empty">Không tìm thấy trường dữ liệu để tạo form.</div>';
        return;
    }

    dynamicForm.innerHTML = state.headers.map((header) => {
        const normalized = String(header || '').toLowerCase();
        const isLong = normalized.includes('địa chỉ') || normalized.includes('address') || normalized.includes('ghi chú') || normalized.includes('note');
        const input = isLong
            ? `<textarea data-field="${escapeHtml(header)}"></textarea>`
            : `<input type="text" data-field="${escapeHtml(header)}">`;
        const fullClass = isLong ? 'form-group full' : 'form-group';
        return `
            <div class="${fullClass}">
                <label>${escapeHtml(header)}</label>
                ${input}
            </div>
        `;
    }).join('');

    fillFormFromCurrentRow();
}

function clampRowIndex(index) {
    if (state.rows.length === 0) return 0;
    return Math.max(0, Math.min(index, state.rows.length - 1));
}

function updateRowIndicator() {
    const total = state.rows.length;
    const current = total > 0 ? state.currentRowIndex + 1 : 0;
    rowIndicator.textContent = `Dòng hiện tại: ${current}/${total}`;

    document.getElementById('prevRowBtn').disabled = total <= 1 || state.currentRowIndex === 0;
    document.getElementById('nextRowBtn').disabled = total <= 1 || state.currentRowIndex >= total - 1;
    document.getElementById('saveRowBtn').disabled = total === 0;
}

function getCurrentRowData() {
    if (!state.rows.length) return {};
    return state.rows[state.currentRowIndex] || {};
}

function fillFormWithData(rowData) {
    document.querySelectorAll('#dynamicForm [data-field]').forEach((el) => {
        const field = el.dataset.field;
        const value = rowData && Object.prototype.hasOwnProperty.call(rowData, field)
            ? rowData[field]
            : '';
        el.value = value == null ? '' : String(value);
    });
}

function fillFormFromCurrentRow() {
    fillFormWithData(getCurrentRowData());
    updateRowIndicator();
}

function collectFormData() {
    const data = {};
    document.querySelectorAll('#dynamicForm [data-field]').forEach((el) => {
        data[el.dataset.field] = el.value;
    });
    return data;
}

function goToRow(rowIndex) {
    if (!state.rows.length) return;
    state.currentRowIndex = clampRowIndex(rowIndex);
    fillFormFromCurrentRow();
}

async function loadSessionData() {
    const response = await fetch(`/api/excel/data/${encodeURIComponent(state.sessionId)}`);
    const data = await parseApiResponse(response);

    state.headers = Array.isArray(data.headers) ? data.headers : [];
    state.rows = Array.isArray(data.rows) ? data.rows : [];
    state.filename = data.filename || '';
    state.currentRowIndex = 0;

    updateMeta();
    buildForm();
    updateRowIndicator();
}

async function saveCurrentRow() {
    if (!state.rows.length) {
        showMessage('error', 'Không có dữ liệu dòng để lưu.');
        return;
    }

    const rowData = collectFormData();
    const response = await fetch(`/api/excel/save/${encodeURIComponent(state.sessionId)}/${state.currentRowIndex}`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ row_data: rowData })
    });
    await parseApiResponse(response);

    state.rows[state.currentRowIndex] = rowData;
    window.location.href = '/excel';
}

function bindEvents() {
    document.getElementById('prevRowBtn').addEventListener('click', () => goToRow(state.currentRowIndex - 1));
    document.getElementById('nextRowBtn').addEventListener('click', () => goToRow(state.currentRowIndex + 1));

    document.getElementById('saveRowBtn').addEventListener('click', async () => {
        try {
            await saveCurrentRow();
        } catch (error) {
            showMessage('error', error.message || 'Không thể lưu dòng hiện tại.');
        }
    });
}

window.addEventListener('load', async () => {
    bindThemeToggleFallback();
    const ok = await ensureAuthenticated();
    if (!ok) return;

    state.sessionId = resolveSessionId();
    if (!state.sessionId) {
        showMessage('error', 'Không tìm thấy session id.');
        return;
    }

    bindEvents();
    try {
        await loadSessionData();
        if (state.rows.length > 0) {
            showMessage('info', 'Đã tạo form tự động từ file Excel. Dùng Dòng trước/Dòng tiếp để xem dữ liệu, bấm Lưu để ghi lịch sử.');
        } else {
            showMessage('error', 'Session không có dữ liệu dòng.');
        }
    } catch (error) {
        showMessage('error', error.message || 'Không thể tải dữ liệu session.');
    }
});
</script>
</body>
</html>
