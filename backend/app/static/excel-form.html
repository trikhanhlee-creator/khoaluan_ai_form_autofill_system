<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFill AI - Excel Form</title>
    <script src="/static/js/theme-manager.js?v=20260401-2"></script>
    <style>
        :root {
            --bg: #edf2f9;
            --surface: #ffffff;
            --surface-soft: #f4f8ff;
            --line: #d3def3;
            --line-strong: #84a4e8;
            --text: #1b2b4a;
            --muted: #5e7298;
            --primary: #3f66d8;
            --success: #0f9f71;
            --danger: #de4a5f;
            --warning: #d98524;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #16223a;
            --surface-soft: #1b2a45;
            --line: #324c7e;
            --line-strong: #5f85d8;
            --text: #e2ebff;
            --muted: #a9bddf;
            --primary: #7099ff;
            --success: #25b787;
            --danger: #ff7b8c;
            --warning: #f6b562;
        }

        .shell {
            max-width: 1200px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .meta-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-soft);
            padding: 8px 10px;
        }

        .meta-item .k {
            font-size: 12px;
            color: var(--muted);
        }

        .meta-item .v {
            font-size: 13px;
            font-weight: 700;
            margin-top: 3px;
            word-break: break-word;
        }

        .toolbar {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: var(--surface-soft);
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .toolbar-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .reference-info {
            font-size: 12px;
            color: var(--muted);
        }

        .row-pill {
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 6px 10px;
            background: color-mix(in srgb, var(--primary) 10%, var(--surface-soft));
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .btn {
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--surface-soft);
            color: var(--primary);
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .btn.primary {
            background: linear-gradient(90deg, var(--primary), #547ce8);
            color: #fff;
            border-color: var(--primary);
        }

        .btn.success {
            background: linear-gradient(90deg, var(--success), #17ac80);
            color: #fff;
            border-color: var(--success);
        }

        .btn.warning {
            background: linear-gradient(90deg, var(--warning), #e79a35);
            color: #fff;
            border-color: var(--warning);
        }

        .btn.danger {
            background: color-mix(in srgb, var(--danger) 12%, var(--surface-soft));
            color: var(--danger);
            border-color: color-mix(in srgb, var(--danger) 52%, var(--line-strong));
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-bottom: 10px;
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid transparent;
            display: none;
            font-size: 13px;
            font-weight: 600;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: color-mix(in srgb, var(--success) 14%, transparent);
            border-color: color-mix(in srgb, var(--success) 35%, transparent);
            color: var(--success);
        }

        .message.error {
            background: color-mix(in srgb, var(--danger) 14%, transparent);
            border-color: color-mix(in srgb, var(--danger) 35%, transparent);
            color: var(--danger);
        }

        .message.info {
            background: color-mix(in srgb, var(--primary) 14%, transparent);
            border-color: color-mix(in srgb, var(--primary) 30%, transparent);
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            background: var(--surface-soft);
            color: var(--text);
            width: 100%;
        }

        .form-group textarea {
            min-height: 78px;
            resize: vertical;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input-wrap input,
        .field-input-wrap textarea {
            padding-right: 44px;
        }

        .field-inline-reference {
            display: none;
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--line-strong);
            background: color-mix(in srgb, var(--primary) 14%, var(--surface-soft));
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .field-inline-reference.active {
            display: flex;
        }

        .field-inline-reference::after {
            content: "▼";
            font-size: 11px;
            font-weight: 800;
            pointer-events: none;
        }

        .field-inline-reference .field-options-select {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .field-options-meta {
            display: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--line-strong);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--line-strong) 22%, transparent);
        }

        .empty {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 14px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
        }

        @media (max-width: 720px) {
            .meta,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <h1 class="title">Excel Dynamic Form</h1>
        <div class="top-actions">
            <button class="btn" type="button" data-theme-toggle><span data-theme-icon>☀️</span><span data-theme-label>Sáng</span></button>
            <a class="btn" href="/excel">← Về trang Excel</a>
        </div>
    </header>

    <section class="panel">
        <h2>Biểu mẫu tự động từ file Excel</h2>
        <div id="mainMessage" class="message"></div>

        <div class="meta">
            <div class="meta-item">
                <div class="k">Session</div>
                <div id="metaSession" class="v">-</div>
            </div>
            <div class="meta-item">
                <div class="k">Tên file</div>
                <div id="metaFilename" class="v">-</div>
            </div>
            <div class="meta-item">
                <div class="k">Tổng số dòng</div>
                <div id="metaRows" class="v">0</div>
            </div>
        </div>

        <form id="dynamicForm" class="form-grid"></form>

        <div class="toolbar">
            <div class="toolbar-row">
                <span id="rowIndicator" class="row-pill">Dòng hiện tại: 0/0</span>
                <button id="prevRowBtn" type="button" class="btn">◀ Dòng trước</button>
                <button id="nextRowBtn" type="button" class="btn">Dòng tiếp ▶</button>
                <button id="addPageBtn" type="button" class="btn primary">📄 Lưu + Trang mới</button>
                <button id="saveRowBtn" type="button" class="btn success">💾 Lưu</button>
            </div>
            <div class="toolbar-row">
                <button id="uploadReferenceBtn" type="button" class="btn warning">📤 Upload Excel tham chiếu</button>
                <input id="referenceExcelInput" type="file" accept=".xlsx,.xls" style="display:none">
                <span id="referenceInfo" class="reference-info">Chưa có file tham chiếu cho gợi ý theo cột.</span>
            </div>
        </div>
    </section>
</div>

<script>
const rawSessionId = '{{SESSION_ID}}';

const state = {
    sessionId: '',
    headers: [],
    rows: [],
    currentRowIndex: 0,
    filename: '',
    referenceOptions: {},
    referenceFilename: '',
    isReferenceAutofill: false
};

const mainMessage = document.getElementById('mainMessage');
const dynamicForm = document.getElementById('dynamicForm');
const rowIndicator = document.getElementById('rowIndicator');

function bindThemeToggleFallback() {
    const buttons = document.querySelectorAll('[data-theme-toggle]');
    buttons.forEach((btn) => {
        if (btn.dataset.themeBound === '1') return;
        btn.addEventListener('click', (event) => {
            event.preventDefault();
            if (window.themeManager && typeof window.themeManager.toggleTheme === 'function') {
                window.themeManager.toggleTheme();
            }
        });
        btn.dataset.themeBound = '1';
    });
}

bindThemeToggleFallback();

function resolveSessionId() {
    if (rawSessionId && !rawSessionId.includes('{')) {
        return decodeURIComponent(rawSessionId);
    }
    const parts = window.location.pathname.split('/');
    return decodeURIComponent(parts[parts.length - 1] || '');
}

function showMessage(type, text) {
    mainMessage.className = `message show ${type}`;
    mainMessage.textContent = text;
}

function clearMessage() {
    mainMessage.className = 'message';
    mainMessage.textContent = '';
}

function escapeHtml(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatDate(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return '-';
    return d.toLocaleString('vi-VN');
}

async function parseApiResponse(response) {
    const rawText = await response.text();
    let data = null;
    try {
        data = rawText ? JSON.parse(rawText) : {};
    } catch (e) {
        data = null;
    }

    if (!response.ok) {
        const message = (data && (data.detail || data.error || data.message))
            ? (data.detail || data.error || data.message)
            : (rawText || `HTTP ${response.status}`);
        throw new Error(message);
    }

    return data || {};
}

async function ensureAuthenticated() {
    try {
        await fetch('/api/auth/check-auth');
        return true;
    } catch (error) {
        return true;
    }
}

function updateMeta() {
    document.getElementById('metaSession').textContent = state.sessionId || '-';
    document.getElementById('metaFilename').textContent = state.filename || '-';
    document.getElementById('metaRows').textContent = String(state.rows.length || 0);
}

function buildForm() {
    if (!state.headers.length) {
        dynamicForm.innerHTML = '<div class="empty">Không tìm thấy trường dữ liệu để tạo form.</div>';
        return;
    }

    dynamicForm.innerHTML = state.headers.map((header, index) => {
        const normalized = String(header || '').toLowerCase();
        const isLong = normalized.includes('địa chỉ') || normalized.includes('address') || normalized.includes('ghi chú') || normalized.includes('note');
        const input = isLong
            ? `<textarea data-field="${escapeHtml(header)}" data-field-index="${index}"></textarea>`
            : `<input type="text" data-field="${escapeHtml(header)}" data-field-index="${index}">`;
        const fullClass = isLong ? 'form-group full' : 'form-group';
        return `
            <div class="${fullClass}">
                <label>${escapeHtml(header)}</label>
                <div class="field-input-wrap">
                    ${input}
                    <div class="field-inline-reference" data-reference-wrap="${index}">
                        <select class="field-options-select" data-field-index="${index}">
                            <option value="">▼</option>
                        </select>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    refreshReferenceOptionControls();
    fillFormFromCurrentRow();
}

function updateReferenceInfo(text) {
    const info = document.getElementById('referenceInfo');
    if (info) {
        info.textContent = text;
    }
}

function normalizeReferenceValue(value) {
    return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function getReferenceInputValueByIndex(index) {
    const input = dynamicForm.querySelector(`input[data-field-index="${index}"], textarea[data-field-index="${index}"]`);
    if (!input) {
        return '';
    }
    return String(input.value || '').trim();
}

function getActiveReferenceFilters(excludeIndex = null) {
    const filters = [];

    state.headers.forEach((header, index) => {
        if (excludeIndex != null && index === excludeIndex) {
            return;
        }

        const optionData = state.referenceOptions[header];
        if (!optionData || optionData.is_unique !== false) {
            return;
        }

        const rawValue = getReferenceInputValueByIndex(index);
        const normalizedValue = normalizeReferenceValue(rawValue);
        if (!normalizedValue) {
            return;
        }

        filters.push({
            header,
            normalizedValue,
        });
    });

    return filters;
}

function getFilteredRowIndexesForHeader(header, excludeIndex = null) {
    const optionData = state.referenceOptions[header];
    const rowValues = optionData?.row_values;
    if (!optionData || !rowValues || typeof rowValues !== 'object') {
        return [];
    }

    let rowIndexes = Object.keys(rowValues);
    const filters = getActiveReferenceFilters(excludeIndex);

    filters.forEach((filter) => {
        const filterData = state.referenceOptions[filter.header];
        const filterRows = filterData?.row_values;
        if (!filterRows || typeof filterRows !== 'object') {
            return;
        }

        rowIndexes = rowIndexes.filter((rowKey) => {
            const candidate = normalizeReferenceValue(filterRows[rowKey] || '');
            return candidate.includes(filter.normalizedValue);
        });
    });

    return rowIndexes
        .map((rowKey) => Number(rowKey))
        .filter((rowIndex) => Number.isInteger(rowIndex) && rowIndex >= 0)
        .sort((a, b) => a - b);
}

function buildChoicesFromFilteredRows(optionData, filteredRowIndexes) {
    if (!optionData || !optionData.row_values || typeof optionData.row_values !== 'object') {
        return [];
    }

    const seen = new Set();
    const choices = [];

    filteredRowIndexes.forEach((rowIndex) => {
        const value = String(optionData.row_values[String(rowIndex)] || '').trim();
        if (!value || seen.has(value)) {
            return;
        }

        seen.add(value);
        choices.push({ value, row_index: rowIndex });
    });

    return choices;
}

function findUniqueReferenceRowMatchByIndex(index) {
    if (!Number.isInteger(index) || index < 0 || index >= state.headers.length) {
        return null;
    }

    const header = state.headers[index];
    const optionData = state.referenceOptions[header];
    if (!optionData || optionData.is_unique === false || !optionData.row_values || typeof optionData.row_values !== 'object') {
        return null;
    }

    const normalizedInput = normalizeReferenceValue(getReferenceInputValueByIndex(index));
    if (!normalizedInput) {
        return null;
    }

    const matchedRows = Object.keys(optionData.row_values)
        .map((rowKey) => {
            const normalizedValue = normalizeReferenceValue(optionData.row_values[rowKey] || '');
            return normalizedValue === normalizedInput ? Number(rowKey) : NaN;
        })
        .filter((rowIndex) => Number.isInteger(rowIndex) && rowIndex >= 0);

    if (matchedRows.length !== 1) {
        return null;
    }

    return matchedRows[0];
}

function tryAutoFillFromUniqueInput(index) {
    if (state.isReferenceAutofill) {
        return false;
    }

    const rowIndex = findUniqueReferenceRowMatchByIndex(index);
    if (!Number.isInteger(rowIndex) || rowIndex < 0) {
        return false;
    }

    applyReferenceRowAutoFill(rowIndex, index, true);
    return true;
}

function refreshReferenceOptionControls() {
    state.headers.forEach((header, index) => {
        const wrap = dynamicForm.querySelector(`[data-reference-wrap="${index}"]`);
        const select = dynamicForm.querySelector(`select.field-options-select[data-field-index="${index}"]`);
        const optionData = state.referenceOptions[header];

        if (!wrap || !select) {
            return;
        }

        if (!optionData || !Array.isArray(optionData.values) || optionData.values.length === 0) {
            wrap.classList.remove('active');
            wrap.style.display = 'none';
            select.innerHTML = '<option value="">▼</option>';
            return;
        }

        const filteredRowIndexes = getFilteredRowIndexesForHeader(header, index);
        const choices = buildChoicesFromFilteredRows(optionData, filteredRowIndexes);
        if (!choices.length) {
            wrap.classList.remove('active');
            wrap.style.display = 'none';
            select.innerHTML = '<option value="">▼</option>';
            return;
        }

        const optionsHtml = choices
            .map((choice) => {
                const value = String(choice?.value || '');
                const rowIndex = choice?.row_index;
                const rowAttr = rowIndex === '' || rowIndex == null ? '' : ` data-row-index="${String(rowIndex)}"`;
                return `<option value="${escapeHtml(value)}"${rowAttr}>${escapeHtml(value)}</option>`;
            })
            .join('');

        select.innerHTML = `<option value="">▼</option>${optionsHtml}`;
        wrap.style.display = 'flex';
        wrap.classList.add('active');
    });
}

function applyReferenceRowAutoFill(rowIndex, sourceFieldIndex, fillAllFields = false) {
    if (!Number.isInteger(rowIndex) || rowIndex < 0) {
        return;
    }

    state.isReferenceAutofill = true;
    try {
        state.headers.forEach((header, index) => {
            if (index === sourceFieldIndex) {
                return;
            }

            const optionData = state.referenceOptions[header];
            if (!optionData || !optionData.row_values || typeof optionData.row_values !== 'object') {
                return;
            }

            if (!fillAllFields && optionData.is_unique === false) {
                return;
            }

            const mappedValue = optionData.row_values[String(rowIndex)];
            const value = mappedValue == null ? '' : String(mappedValue).trim();
            if (!value) {
                return;
            }

            const input = dynamicForm.querySelector(`input[data-field-index="${index}"], textarea[data-field-index="${index}"]`);
            if (!input) {
                return;
            }

            input.value = value;
            input.dispatchEvent(new Event('input', { bubbles: true }));
        });
    } finally {
        state.isReferenceAutofill = false;
    }
}

function applyReferenceSelectValue(selectElement) {
    const index = Number(selectElement.dataset.fieldIndex);
    if (!Number.isInteger(index) || index < 0) {
        return;
    }

    const value = selectElement.value || '';
    if (!value) {
        return;
    }

    const input = dynamicForm.querySelector(`input[data-field-index="${index}"], textarea[data-field-index="${index}"]`);
    if (!input) {
        return;
    }

    const selectedOption = selectElement.options[selectElement.selectedIndex];
    const rowIndexRaw = selectedOption ? selectedOption.getAttribute('data-row-index') : null;
    const rowIndex = rowIndexRaw == null || rowIndexRaw === '' ? NaN : Number(rowIndexRaw);

    state.isReferenceAutofill = true;
    try {
        input.value = value;
        input.dispatchEvent(new Event('input', { bubbles: true }));
    } finally {
        state.isReferenceAutofill = false;
    }

    const header = state.headers[index];
    const optionData = state.referenceOptions[header];
    if (optionData && optionData.is_unique !== false && Number.isInteger(rowIndex) && rowIndex >= 0) {
        applyReferenceRowAutoFill(rowIndex, index, true);
    }

    refreshReferenceOptionControls();
    selectElement.selectedIndex = 0;
}

async function uploadReferenceExcelFile() {
    const fileInput = document.getElementById('referenceExcelInput');
    const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
    if (!file) {
        return;
    }

    if (!state.headers.length) {
        showMessage('error', 'Không có trường form để đối chiếu dữ liệu tham chiếu.');
        fileInput.value = '';
        return;
    }

    const formData = new FormData();
    formData.append('file', file);
    formData.append('fields_json', JSON.stringify(state.headers));

    try {
        updateReferenceInfo(`Đang xử lý file tham chiếu: ${file.name}...`);

        const response = await fetch('/api/excel/reference-field-options', {
            method: 'POST',
            credentials: 'same-origin',
            body: formData
        });

        const data = await parseApiResponse(response);
        state.referenceOptions = (data.matches && typeof data.matches === 'object') ? data.matches : {};
        state.referenceFilename = file.name;

        refreshReferenceOptionControls();

        const matchedCount = Number(data.matched_count || 0);
        updateReferenceInfo(`Đã nạp ${matchedCount} trường gợi ý từ file: ${state.referenceFilename}`);
        showMessage('success', data.message || `Đã đối chiếu ${matchedCount} trường từ file tham chiếu.`);
    } catch (error) {
        updateReferenceInfo('Không thể đọc file tham chiếu. Vui lòng thử lại.');
        showMessage('error', error.message || 'Không thể xử lý file Excel tham chiếu.');
    } finally {
        fileInput.value = '';
    }
}

function clampRowIndex(index) {
    if (state.rows.length === 0) return 0;
    return Math.max(0, Math.min(index, state.rows.length - 1));
}

function updateRowIndicator() {
    const total = state.rows.length;
    const current = total > 0 ? state.currentRowIndex + 1 : 0;
    rowIndicator.textContent = `Dòng hiện tại: ${current}/${total}`;

    document.getElementById('prevRowBtn').disabled = total <= 1 || state.currentRowIndex === 0;
    document.getElementById('nextRowBtn').disabled = total <= 1 || state.currentRowIndex >= total - 1;
    document.getElementById('addPageBtn').disabled = state.headers.length === 0;
    document.getElementById('saveRowBtn').disabled = total === 0;
}

function getCurrentRowData() {
    if (!state.rows.length) return {};
    return state.rows[state.currentRowIndex] || {};
}

function fillFormWithData(rowData) {
    document.querySelectorAll('#dynamicForm [data-field]').forEach((el) => {
        const field = el.dataset.field;
        const value = rowData && Object.prototype.hasOwnProperty.call(rowData, field)
            ? rowData[field]
            : '';
        el.value = value == null ? '' : String(value);
    });
}

function fillFormFromCurrentRow() {
    fillFormWithData(getCurrentRowData());
    refreshReferenceOptionControls();
    updateRowIndicator();
}

function collectFormData() {
    const data = {};
    document.querySelectorAll('#dynamicForm [data-field]').forEach((el) => {
        data[el.dataset.field] = el.value;
    });
    return data;
}

function hasAnyValue(rowData) {
    return Object.values(rowData || {}).some((value) => String(value ?? '').trim() !== '');
}

function buildEmptyRow() {
    const row = {};
    state.headers.forEach((header) => {
        row[header] = '';
    });
    return row;
}

function goToRow(rowIndex) {
    if (!state.rows.length) return;
    state.currentRowIndex = clampRowIndex(rowIndex);
    fillFormFromCurrentRow();
}

async function loadSessionData() {
    const response = await fetch(`/api/excel/data/${encodeURIComponent(state.sessionId)}`);
    const data = await parseApiResponse(response);

    state.headers = Array.isArray(data.headers) ? data.headers : [];
    state.rows = Array.isArray(data.rows) ? data.rows : [];
    state.filename = data.filename || '';
    state.currentRowIndex = 0;

    updateMeta();
    buildForm();
    updateRowIndicator();
}

async function saveCurrentRow() {
    if (!state.rows.length) {
        showMessage('error', 'Không có dữ liệu dòng để lưu.');
        return;
    }

    const rowData = collectFormData();
    const response = await fetch(`/api/excel/save/${encodeURIComponent(state.sessionId)}/${state.currentRowIndex}`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ row_data: rowData })
    });
    await parseApiResponse(response);

    state.rows[state.currentRowIndex] = rowData;
    window.location.href = '/excel';
}

async function addNewPage() {
    if (!state.sessionId) {
        showMessage('error', 'Không tìm thấy session để thêm trang mới.');
        return;
    }

    if (!state.headers.length) {
        showMessage('error', 'Không có trường dữ liệu để tạo trang mới.');
        return;
    }

    const rowData = collectFormData();
    const shouldSaveCurrent = state.rows.length > 0 && hasAnyValue(rowData);

    if (shouldSaveCurrent) {
        const saveResponse = await fetch(`/api/excel/save/${encodeURIComponent(state.sessionId)}/${state.currentRowIndex}`, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ row_data: rowData })
        });
        await parseApiResponse(saveResponse);
        state.rows[state.currentRowIndex] = rowData;
    }

    const response = await fetch(`/api/excel/add-page/${encodeURIComponent(state.sessionId)}`, {
        method: 'POST',
        credentials: 'same-origin'
    });
    const result = await parseApiResponse(response);

    const serverRow = (result && result.row_data && typeof result.row_data === 'object')
        ? result.row_data
        : buildEmptyRow();
    state.rows.push(serverRow);
    state.currentRowIndex = state.rows.length - 1;

    updateMeta();
    fillFormFromCurrentRow();
    showMessage('success', shouldSaveCurrent
        ? '✅ Đã lưu trang hiện tại và tạo trang mới.'
        : '✅ Đã tạo trang mới, bạn có thể tiếp tục nhập.');
}

function bindEvents() {
    document.getElementById('prevRowBtn').addEventListener('click', () => goToRow(state.currentRowIndex - 1));
    document.getElementById('nextRowBtn').addEventListener('click', () => goToRow(state.currentRowIndex + 1));
    document.getElementById('uploadReferenceBtn').addEventListener('click', () => {
        document.getElementById('referenceExcelInput').click();
    });
    document.getElementById('referenceExcelInput').addEventListener('change', async () => {
        await uploadReferenceExcelFile();
    });
    dynamicForm.addEventListener('change', (event) => {
        if (event.target && event.target.matches('.field-options-select')) {
            applyReferenceSelectValue(event.target);
        }
    });
    dynamicForm.addEventListener('input', (event) => {
        if (event.target && event.target.matches('input[data-field], textarea[data-field]')) {
            if (state.isReferenceAutofill) {
                return;
            }

            const fieldIndex = Number(event.target.dataset.fieldIndex);
            if (Number.isInteger(fieldIndex) && fieldIndex >= 0) {
                tryAutoFillFromUniqueInput(fieldIndex);
            }

            refreshReferenceOptionControls();
        }
    });

    document.getElementById('addPageBtn').addEventListener('click', async () => {
        try {
            await addNewPage();
        } catch (error) {
            showMessage('error', error.message || 'Không thể thêm trang mới.');
        }
    });

    document.getElementById('saveRowBtn').addEventListener('click', async () => {
        try {
            await saveCurrentRow();
        } catch (error) {
            showMessage('error', error.message || 'Không thể lưu dòng hiện tại.');
        }
    });
}

window.addEventListener('load', async () => {
    bindThemeToggleFallback();
    const ok = await ensureAuthenticated();
    if (!ok) return;

    state.sessionId = resolveSessionId();
    if (!state.sessionId) {
        showMessage('error', 'Không tìm thấy session id.');
        return;
    }

    bindEvents();
    try {
        await loadSessionData();
        if (state.rows.length > 0) {
            showMessage('info', 'Đã tạo form tự động từ file Excel. Dùng Dòng trước/Dòng tiếp để xem dữ liệu, bấm Lưu để ghi lịch sử hoặc Lưu + Trang mới để nhập liên tục.');
        } else {
            showMessage('info', 'Session chưa có dòng dữ liệu. Hãy bấm Lưu + Trang mới để bắt đầu nhập.');
        }
    } catch (error) {
        showMessage('error', error.message || 'Không thể tải dữ liệu session.');
    }
});
</script>
</body>
</html>
